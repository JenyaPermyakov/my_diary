<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}My Diary{% endblock %}</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
        }

        .navbar {
            background-color: #343a40;
        }

        .navbar a {
            color: #ffffff !important;
        }

        .container {
            margin-top: 30px;
        }

        .card {
            border-radius: 10px;
        }
    </style>
</head>
<body>

<!-- 🔹 Navbar -->
<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand text-white" href="{% url 'entry_list' %}">
            My Diary
        </a>

        <div>
            <a href="{% url 'entry_create' %}" class="btn btn-outline-light btn-sm">
                + Новая запись
            </a>
        </div>
    </div>
</nav>

<!-- 🔹 Контент -->
<div class="container">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
