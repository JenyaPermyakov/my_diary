<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}My Diary{% endblock %}</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
        }

        .navbar {
            background-color: #343a40;
        }

        .navbar a {
            color: #ffffff !important;
        }

        .container {
            margin-top: 10px;
        }

        .card {
            border-radius: 10px;
        }
    </style>
</head>
<body>

<!-- 🔹 Navbar -->
<nav class="navbar navbar-expand-lg">
    <div class="container d-flex justify-content-between align-items-center">

        <!-- Логотип -->
        <a class="navbar-brand text-white" href="{% url 'entry_list' %}">
            Мой дневник
        </a>

        <!-- Правая часть -->
        <div class="d-flex gap-2 align-items-center">

            <a href="{% url 'entry_create' %}" class="btn btn-outline-light btn-sm">
                + Новая запись
            </a>

            {% if user.is_authenticated %}
                <span class="text-white">
                    {{ user.username }}
                </span>

                <form method="post" action="{% url 'logout' %}" class="m-0">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-outline-light btn-sm">
                        Выйти
                    </button>
                </form>
            {% else %}
                <a href="{% url 'login' %}" class="btn btn-outline-light btn-sm">
                    Войти
                </a>
            {% endif %}

        </div>
    </div>
</nav>

<!-- 🔹 Контент -->
<div class="container">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
