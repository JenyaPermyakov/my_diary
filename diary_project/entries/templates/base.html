<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}My Diary{% endblock %}</title>


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
        }

        .navbar {
            background-color: #343a40;
        }

        .navbar a {
            color: #ffffff !important;
        }

        .container {
            margin-top: 10px;
        }

        .card {
            border-radius: 10px;
        }
    </style>
</head>
<body>


<nav class="navbar navbar-expand-lg">
    <div class="container d-flex justify-content-between align-items-center">


        <a class="navbar-brand text-white" href="{% url 'entry_list' %}">
            Мой дневник
        </a>


        <div class="d-flex gap-2 align-items-center">

            <a href="{% url 'entry_create' %}" class="btn btn-outline-light btn-sm">
                + Новая запись
            </a>

            {% if user.is_authenticated %}

                <a href="{% url 'profile' %}" class="btn btn-outline-light btn-sm">
                    Профиль
                </a>

                <form method="post" action="{% url 'logout' %}" class="m-0">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-outline-light btn-sm">
                        Выйти
                    </button>
                </form>

                {% else %}
                <a href="{% url 'login' %}" class="btn btn-outline-light btn-sm">
                    Войти
                </a>

                <a href="{% url 'register' %}" class="btn btn-light btn-sm">
                    Регистрация
                </a>
            {% endif %}

        </div>
    </div>
</nav>


{% if user.is_authenticated %}
<div class="container mt-3">
    <div class="p-3 bg-white rounded shadow-sm d-flex justify-content-between align-items-center">
        <div>
            <span class="text-muted">Добро пожаловать,</span>
            <strong>{{ user.username }}</strong> 👋
        </div>
    </div>
</div>
{% endif %}


<div class="container">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
