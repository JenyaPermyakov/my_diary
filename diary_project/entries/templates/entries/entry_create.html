{% extends 'base.html' %}

{% block title %}Создать запись{% endblock %}

{% block content %}
<h2 class="mb-4">Создать запись</h2>

<div class="card p-4">
    <form method="post">
        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit" class="btn btn-primary">Сохранить</button>
        <a href="{% url 'entry_list' %}" class="btn btn-outline-secondary">Отмена</a>
    </form>
</div>
{% endblock %}
