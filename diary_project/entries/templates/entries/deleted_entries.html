{% extends 'base.html' %}

{% block title %}Корзина{% endblock %}

{% block content %}

<h2 class="mb-4">Удалённые записи</h2>

{% for entry in entries %}
<div class="card p-3 mb-3">

    <h5>{{ entry.title }}</h5>
    <p>{{ entry.content|truncatewords:15 }}</p>

    <div class="mt-2">
        <form method="post" action="{% url 'entry_restore' entry.id %}" class="d-inline">
            {% csrf_token %}
            <button type="submit" class="btn btn-sm btn-success">Восстановить</button>
        </form>

        <form method="post" action="{% url 'entry_hard_delete' entry.id %}" class="d-inline">
            {% csrf_token %}
            <button type="submit" class="btn btn-sm btn-danger">Удалить навсегда</button>
        </form>
    </div>

</div>
{% empty %}
<p>Корзина пуста</p>
{% endfor %}

{% endblock %}
