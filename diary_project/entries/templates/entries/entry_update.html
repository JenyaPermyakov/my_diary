{% extends 'base.html' %}

{% block title %}Редактировать{% endblock %}

{% block content %}
<h2 class="mb-4">Редактировать запись</h2>

<div class="card p-4">
    <form method="post">
        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit" class="btn btn-primary">Обновить</button>
        <a href="{% url 'entry_detail' object.id %}" class="btn btn-outline-secondary">Отмена</a>
    </form>
</div>
{% endblock %}
