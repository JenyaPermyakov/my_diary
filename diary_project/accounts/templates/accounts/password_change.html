{% extends 'base.html' %}

{% block title %}Смена пароля{% endblock %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-5">

        <div class="card p-4">
            <h3 class="mb-4 text-center">Смена пароля</h3>

            <form method="post">
                {% csrf_token %}

                {% if form.errors %}
                    <div class="alert alert-danger">
                        {{ form.errors }}
                    </div>
                {% endif %}

                <div class="mb-3">
                    <label class="form-label">Старый пароль</label>
                    {{ form.old_password }}
                </div>

                <div class="mb-3">
                    <label class="form-label">Новый пароль</label>
                    {{ form.new_password1 }}
                </div>

                <div class="mb-3">
                    <label class="form-label">Подтверждение пароля</label>
                    {{ form.new_password2 }}
                </div>

                <button type="submit" class="btn btn-dark w-100">
                    Сменить пароль
                </button>

            </form>
        </div>

    </div>
</div>

{% endblock %}
